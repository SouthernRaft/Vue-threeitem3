<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>豆包 AI 对话截图素材</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #eef1f6;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #111827;
    }
    .shot {
      width: 1120px;
      height: 900px;
      background: #f7f8fb;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 72px;
      padding: 0 28px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 22px;
      font-weight: 700;
    }
    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f7cff, #7b61ff);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }
    .meta {
      color: #6b7280;
      font-size: 14px;
    }
    .chat {
      flex: 1;
      padding: 30px 42px 18px;
      overflow: hidden;
    }
    .date {
      width: max-content;
      margin: 0 auto 24px;
      padding: 6px 14px;
      border-radius: 999px;
      background: #e9edf5;
      color: #6b7280;
      font-size: 14px;
    }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 22px;
    }
    .row.user { flex-direction: row-reverse; }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .ai .avatar {
      background: #eef2ff;
      color: #4f46e5;
      border: 1px solid #dbe4ff;
    }
    .user .avatar {
      background: #111827;
      color: #fff;
    }
    .bubble-wrap { max-width: 790px; }
    .name {
      margin-bottom: 6px;
      color: #6b7280;
      font-size: 14px;
    }
    .user .name { text-align: right; }
    .bubble {
      padding: 15px 18px;
      border-radius: 12px;
      line-height: 1.62;
      font-size: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      white-space: pre-line;
    }
    .ai .bubble {
      background: #fff;
      border: 1px solid #e5e7eb;
    }
    .user .bubble {
      background: #2563eb;
      color: #fff;
    }
    .composer {
      height: 86px;
      margin: 0 42px 30px;
      padding: 18px 22px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      color: #9ca3af;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 16px;
      flex: 0 0 auto;
    }
    .send {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2563eb;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <main class="shot">
    <header class="topbar">
      <div class="brand">
        <div class="logo">豆</div>
        <div>豆包</div>
      </div>
      <div class="meta">AI 学习助手 · Vue 三级项目</div>
    </header>
    <section class="chat">
      <div class="date">2026年5月31日</div>
      <div class="row user">
        <div class="avatar">我</div>
        <div class="bubble-wrap">
          <div class="name">我</div>
          <div class="bubble" id="question"></div>
        </div>
      </div>
      <div class="row ai">
        <div class="avatar">豆</div>
        <div class="bubble-wrap">
          <div class="name">豆包</div>
          <div class="bubble" id="answer"></div>
        </div>
      </div>
    </section>
    <footer class="composer">
      <span>输入你的问题...</span>
      <div class="send">↑</div>
    </footer>
  </main>

  <script>
    const dialogs = [
      {
        q: "我正在做《互联网应用开发技术》三级项目，要求使用 Vue3 + Vite。请帮我梳理一个游戏商城类项目至少需要哪些页面、路由、组件和 json-server 数据，怎样才能满足实验要求？",
        a: "可以按“首页 + 列表页 + 详情页 + 扩展功能页”的结构来做。\n\n页面建议包括：首页、游戏库列表页、游戏详情页、特惠页、玩家社区、个人中心、搜索页、订单详情页、新闻详情页和 404 页面。\n\n路由可以设置 /、/store、/deals、/community、/profile、/game/:id、/category/:type、/search?keyword=、/order/:id、/news/:id 等。\n\n数据方面用 json-server，把 games、categories、deals、posts、news、orders、reviews、coupons 写入 game.json。这样能覆盖首页展示、列表筛选、详情查询、社区内容和个人中心数据。"
      },
      {
        q: "我的项目主题是 GameHub 1302 游戏商城。请问 game.json 里面应该怎样设计 games、categories、deals、posts、news、orders、reviews、coupons 这些数据字段？",
        a: "可以这样组织：\n\ngames 保存游戏主体数据，包括 id、name、category、categoryName、platform、developer、publisher、releaseDate、price、originalPrice、discount、score、players、tags、cover、banner、summary。\n\ncategories 保存分类数据，包括 id、type、name、count、color。\n\ndeals 保存特惠数据，包括 id、gameId、name、cover、oldPrice、nowPrice、discount、until、reason。\n\nposts、news、orders、reviews、coupons 分别对应社区帖子、公告新闻、订单记录、玩家评论和优惠券。每类数据至少准备 10 条，页面就可以全部从 json-server 读取。"
      },
      {
        q: "游戏库列表页需要支持关键字搜索、分类筛选、最高价格筛选、只看免费、评分/价格/玩家数排序和分页。Vue3 里用 computed 怎么写这个组合筛选逻辑比较清楚？",
        a: "建议把筛选条件放在一个 reactive 对象里，例如 keyword、category、maxPrice、freeOnly、sort。然后写一个 filteredGames 计算属性统一处理。\n\n思路是：先按价格过滤，再按关键字过滤，再按分类过滤，如果 freeOnly 为 true 再筛选 price === 0。最后根据 sort 的值排序，例如 score 用 b.score - a.score，price 用 a.price - b.price，players 用 b.players - a.players。\n\n分页可以再写 pagedGames，根据当前 page 计算 start = (page - 1) * pageSize，然后 slice(start, start + pageSize)。这样模板里只渲染 pagedGames。"
      },
      {
        q: "Vue Router 里面 params 和 query 应该怎么区分？我的项目里有 /game/:id、/category/:type、/order/:id、/news/:id，还有搜索页 /search?keyword=，这些跳转应该怎么写？",
        a: "params 适合表示路径本身的一部分，例如详情页 id 或分类 type。你的游戏详情可以定义 /game/:id，跳转时写 router.push({ name: 'gameDetail', params: { id: game.id } })。\n\n分类页 /category/:type 可以写 router.push({ name: 'category', params: { type: item.type } })。订单详情和新闻详情同理，用 id 作为 params。\n\nquery 适合搜索条件、筛选条件这类可选参数。搜索页可以定义 /search，跳转时写 router.push({ name: 'search', query: { keyword: keyword.value } })，页面里用 route.query.keyword 读取。"
      },
      {
        q: "我已经完成了 Vue3 游戏商城项目，现在要写三级项目报告。请帮我按照模板把项目需求、项目意义、需求分析、接口设计、架构设计、实现步骤、测试发布、AI 应用和项目总结这些章节整理成报告内容。",
        a: "报告可以按模板章节展开。\n\n项目需求写清楚使用 Vue3 + Vite、Element Plus、Vue Router、Pinia、axios 和 json-server，并说明页面数量、路由数量、数据来源和 UI 组件使用情况。\n\n需求分析可以逐页说明：首页轮播和推荐、游戏库筛选和分页、详情页数据联动、特惠页优惠券、社区页帖子、个人中心订单和收藏。\n\n接口设计写 game.json 数据表和 json-server 地址。架构设计用表格说明 src 下每个文件功能。实现步骤按首页、列表页、详情页、特惠页、社区页、个人中心分段写。测试发布写 npm run server、npm run dev、npm run build。最后总结开发收获和不足。"
      }
    ];

    const index = Number(new URLSearchParams(location.search).get("i") || "0");
    const dialog = dialogs[index] || dialogs[0];
    document.getElementById("question").textContent = dialog.q;
    document.getElementById("answer").textContent = dialog.a;
  </script>
</body>
</html>
